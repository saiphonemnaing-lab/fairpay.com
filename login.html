<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in | WageSignal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <a class="brand auth-brand" href="/" aria-label="WageSignal home">
        <span class="brand-mark" aria-hidden="true">WS</span>
        <span>
          <strong>WageSignal</strong>
          <small>anonymous compensation exchange</small>
        </span>
      </a>

      <section class="auth-card" aria-labelledby="loginTitle">
        <p class="eyebrow">Account access</p>
        <h1 id="loginTitle">Log in to WageSignal</h1>
        <p class="auth-copy">Save reports on your account, keep reactions synced, and return to your pay signal later.</p>

        <a class="google-action" href="/auth/google">
          <span aria-hidden="true">G</span>
          Continue with Google
        </a>

        <div id="authMessage" class="auth-message" hidden></div>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
